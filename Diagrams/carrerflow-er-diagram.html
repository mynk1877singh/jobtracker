<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobTracker – ER Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f8f9fb;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 44px;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    color: #6366f1;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.5px;
  }

  h1 span { color: #6366f1; }

  .subtitle {
    font-size: 13px;
    color: #9ca3af;
    margin-top: 5px;
  }

  .diagram-container {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 980px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  svg { width: 100%; height: auto; overflow: visible; }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #f3f4f6;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #6b7280;
    font-family: 'JetBrains Mono', monospace;
  }

  .legend-swatch {
    width: 28px;
    height: 3px;
    border-radius: 2px;
  }
  .legend-icon {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>

  <h1>Job<span>Tracker</span></h1>
  <p class="subtitle">Database schema · 3 entities · 3 relationships</p>
</header>

<div class="diagram-container">
