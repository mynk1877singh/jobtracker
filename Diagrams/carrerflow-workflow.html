<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobTracker – System Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #58a6ff;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header h1 {
    font-size: 32px;
    font-weight: 600;
    color: #e6edf3;
    letter-spacing: -0.5px;
  }

  header h1 span {
    color: #58a6ff;
  }

  header p {
    font-size: 13px;
    color: #8b949e;
    margin-top: 6px;
    font-weight: 300;
  }

  .diagram-wrapper {
    width: 100%;
    max-width: 900px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 28px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #8b949e;
    font-family: 'IBM Plex Mono', monospace;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  @keyframes dash {
    to { stroke-dashoffset: -20; }
  }

  .flow-line {
    animation: dash 1.2s linear infinite;
  }
</style>
</head>
<body>

<header>
  <div class="badge">System Architecture</div>
  <h1>Job<span>Tracker</span> Workflow</h1>
  <p>End-to-end request lifecycle · Backend system diagram</p>
</header>

<div class="diagram-wrapper">
<svg viewBox="0 0 860 1060" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f78166"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bc8cff"/>
    </marker>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1c2128" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="1060" fill="#0d1117" rx="16"/>
  <rect width="860" height="1060" fill="url(#grid)" rx="16" opacity="0.6"/>

  <!-- ─────────────────────── LANE LABELS ─────────────────────── -->
  <!-- Client lane -->
  <rect x="20" y="20" width="220" height="1020" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="48" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#58a6ff" letter-spacing="2">CLIENT</text>

  <!-- System lane -->
  <rect x="260" y="20" width="200" height="1020" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="48" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#3fb950" letter-spacing="2">SYSTEM</text>

  <!-- Backend lane -->
  <rect x="480" y="20" width="360" height="1020" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="48" text-anchor="middle" font-family="IBM Plex Mono" font-size="11" fill="#bc8cff" letter-spacing="2">BACKEND · DATABASE</text>


  <!-- ═══════════════════════ NODES ═══════════════════════ -->

  <!-- START -->
  <ellipse cx="130" cy="100" rx="52" ry="24" fill="#58a6ff" filter="url(#glow)"/>
  <text x="130" y="105" text-anchor="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="#0d1117">START</text>

  <!-- Open App -->
  <rect x="50" y="154" width="160" height="50" rx="8" fill="#1c2940" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="130" y="174" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#cdd9e5">User Opens</text>
  <text x="130" y="191" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#cdd9e5">Application</text>

  <!-- ACTIONS GROUP -->
  <!-- Group box -->
  <rect x="30" y="234" width="200" height="210" rx="8" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="130" y="252" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#8b949e" letter-spacing="1">USER ACTIONS</text>

  <!-- View Jobs -->
  <rect x="50" y="262" width="160" height="34" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="284" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#3fb950">▸ View Jobs</text>

  <!-- Add Job -->
  <rect x="50" y="304" width="160" height="34" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="326" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#3fb950">▸ Add Job</text>

  <!-- Update Job -->
  <rect x="50" y="346" width="160" height="34" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="368" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#3fb950">▸ Update Job</text>

  <!-- Delete Job -->
  <rect x="50" y="388" width="160" height="34" rx="6" fill="#1c2128" stroke="#f78166" stroke-width="1.5"/>
  <text x="130" y="410" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#f78166">▸ Delete Job</text>

  <!-- HTTP Request -->
  <rect x="270" y="490" width="180" height="50" rx="8" fill="#1c2128" stroke="#3fb950" stroke-width="1.5"/>
  <text x="360" y="510" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#cdd9e5">HTTP Request</text>
  <text x="360" y="527" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">→ Backend API</text>

  <!-- BACKEND PIPELINE -->
  <!-- Controller -->
  <rect x="500" y="420" width="150" height="50" rx="8" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="575" y="440" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">LAYER 1</text>
  <text x="575" y="458" text-anchor="middle" font-family="IBM Plex Sans" font-size="13" font-weight="600" fill="#bc8cff">Controller</text>

  <!-- Service -->
  <rect x="500" y="510" width="150" height="50" rx="8" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="575" y="530" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">LAYER 2</text>
  <text x="575" y="548" text-anchor="middle" font-family="IBM Plex Sans" font-size="13" font-weight="600" fill="#bc8cff">Service</text>

  <!-- Repository -->
  <rect x="500" y="600" width="150" height="50" rx="8" fill="#21262d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="575" y="620" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">LAYER 3</text>
  <text x="575" y="638" text-anchor="middle" font-family="IBM Plex Sans" font-size="13" font-weight="600" fill="#bc8cff">Repository</text>

  <!-- Database -->
  <!-- Cylinder -->
  <ellipse cx="700" cy="630" rx="60" ry="16" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <rect x="640" y="630" width="120" height="60" fill="#21262d" stroke-left="none"/>
  <line x1="640" y1="630" x2="640" y2="690" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="760" y1="630" x2="760" y2="690" stroke="#f0883e" stroke-width="1.5"/>
  <ellipse cx="700" cy="690" rx="60" ry="16" fill="#21262d" stroke="#f0883e" stroke-width="1.5"/>
  <!-- Fill to hide lines inside cylinder -->
  <rect x="641" y="631" width="118" height="59" fill="#21262d"/>
  <text x="700" y="660" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">DATABASE</text>
  <text x="700" y="676" text-anchor="middle" font-family="IBM Plex Sans" font-size="13" font-weight="600" fill="#f0883e">Jobs Store</text>

  <!-- HTTP Response -->
  <rect x="270" y="760" width="180" height="50" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="360" y="780" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#cdd9e5">HTTP Response</text>
  <text x="360" y="797" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#8b949e">← Backend API</text>

  <!-- Updated List -->
  <rect x="50" y="840" width="160" height="50" rx="8" fill="#1c2940" stroke="#3fb950" stroke-width="1.5"/>
  <text x="130" y="861" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#cdd9e5">User Sees</text>
  <text x="130" y="878" text-anchor="middle" font-family="IBM Plex Sans" font-size="12" fill="#3fb950">Updated Job List</text>

  <!-- END -->
  <ellipse cx="130" cy="960" rx="52" ry="24" fill="#3fb950" filter="url(#glow)"/>
  <text x="130" y="965" text-anchor="middle" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="#0d1117">END</text>


  <!-- ═══════════════════════ ARROWS ═══════════════════════ -->

  <!-- Start → Open App -->
  <line x1="130" y1="124" x2="130" y2="152" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Open App → Actions -->
  <line x1="130" y1="204" x2="130" y2="232" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Actions → HTTP Request (from bottom of group to system lane) -->
  <!-- from bottom-center of group box to system lane -->
  <path d="M 230 444 Q 300 466 270 515" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- HTTP Request → Controller -->
  <line x1="450" y1="515" x2="498" y2="445" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Controller → Service -->
  <line x1="575" y1="470" x2="575" y2="508" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Service → Repository -->
  <line x1="575" y1="560" x2="575" y2="598" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Repository → DB -->
  <line x1="650" y1="625" x2="675" y2="618" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-orange)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- DB → Repository (return) -->
  <path d="M 700 706 Q 700 730 660 730 Q 570 730 575 652" stroke="#f0883e" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Repository → HTTP Response (backend returns) -->
  <path d="M 500 625 Q 450 700 450 785" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- HTTP Response → Updated List -->
  <path d="M 270 785 Q 220 800 210 865" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="5 3" class="flow-line"/>

  <!-- Updated List → End -->
  <line x1="130" y1="890" x2="130" y2="934" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="5 3" class="flow-line"/>


  <!-- ═══════════════════════ LAYER CONNECTOR LABELS ═══════════════════════ -->
  <text x="660" y="502" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#30363d">→</text>

  <!-- Connector label: request -->
  <rect x="336" y="454" width="52" height="18" rx="4" fill="#0d1117"/>
  <text x="362" y="467" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#8b949e">REQUEST</text>

  <!-- Connector label: response -->
  <rect x="384" y="718" width="58" height="18" rx="4" fill="#0d1117"/>
  <text x="413" y="731" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#8b949e">RESPONSE</text>

  <!-- DB read/write labels -->
  <rect x="605" y="600" width="48" height="16" rx="3" fill="#0d1117"/>
  <text x="629" y="612" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#f0883e">READ/WRITE</text>

  <!-- Processing bracket on backend -->
  <rect x="490" y="398" width="280" height="14" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="409" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#8b949e" letter-spacing="1">BACKEND PROCESSING PIPELINE</text>

</svg>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#58a6ff;"></div>
    Client Flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#3fb950;"></div>
    System Flow
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#bc8cff;"></div>
    Backend Pipeline
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f0883e;"></div>
    Database Layer
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f78166;"></div>
    Destructive Action
  </div>
</div>

</body>
</html>
